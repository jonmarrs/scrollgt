name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest -q
      - name: Smoke the CLI against a shipped target (constant predictor)
        run: |
          python - <<'PY'
          import numpy as np
          from PIL import Image
          from scrollgt.score import load_target
          gt, _, _ = load_target("data/scroll1_20231210121321")
          Image.fromarray(np.full(gt.shape, 128, "uint8")).save("pred.png")
          PY
          scrollgt score pred.png data/scroll1_20231210121321
          scrollgt check --window-px 64 --scan-um 8.0
